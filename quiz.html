<!DOCTYPE html>
<html>
<head>
    <title>Quiz</title>

    <style>
        body {
            background-color: #0f172a;
            color: white;
            font-family: Arial;
            text-align: center;
        }

        .container {
            margin-top: 100px;
        }

        input {
            padding: 10px;
            width: 200px;
            border-radius: 5px;
            border: none;
        }

        button {
            padding: 10px 15px;
            border: none;
            border-radius: 5px;
            background-color: #38bdf8;
            color: black;
            cursor: pointer;
        }

        .result {
            margin-top: 20px;
            font-size: 20px;
        }

        .box {
            background-color: #1e293b;
            padding: 30px;
            border-radius: 10px;
            width: 400px;
            margin: auto;
        }
    </style>
</head>

<body>

<div class="container">
    <div class="box">

        <h2>🧠 Quiz Time</h2>

        <!-- QUESTION -->
        <h3>{{ question }}</h3>

        <!-- FORM -->
        <form method="POST">
            <input type="text" name="answer" placeholder="Enter your answer">
            <br><br>
            <button type="submit">Submit</button>
        </form>

        <!-- RESULT -->
        <div class="result">
            <p>{{ result }}</p>
        </div>

        <br>

        <!-- BACK BUTTON -->
        <a href="/chatbot">
            <button>⬅ Back to Chat</button>
        </a>

    </div>
</div>

</body>
</html>
