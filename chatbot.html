<!DOCTYPE html>
<html>
<head>
    <title>Chatbot</title>
    <script>
    let text = "<span id="typing"></span>";
    let index = 0;
    let speed = 20;

    function typeEffect() {
        if (index < text.length) {
            document.getElementById("typing").innerHTML += text.charAt(index);
            index++;
            setTimeout(typeEffect, speed);
        }
    }

    window.onload = function() {
        typeEffect();
    }
</script>
    <style>
        body {
            margin: 0;
            font-family: Arial;
            color: white;

            /* 🌈 Same Gradient */
            background: linear-gradient(135deg, #3b82f6, #9333ea, #ec4899);
        }

        .header {
            text-align: center;
            padding: 20px;
            font-size: 25px;
            font-weight: bold;
        }

        .chatbox {
            width: 60%;
            margin: auto;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 15px;
        }

        input {
            width: 75%;
            padding: 10px;
            border-radius: 5px;
            border: none;
        }

        button {
            padding: 10px;
            border-radius: 5px;
            border: none;
            background: #38bdf8;
            cursor: pointer;
        }

        .message {
            margin-top: 20px;
            background: rgba(0,0,0,0.3);
            padding: 15px;
            border-radius: 10px;
        }

    </style>
</head>

<body>

<div class="header">🤖 Edora AI Chat</div>

<div class="chatbox">

    <form method="POST">
        <input type="text" name="message" placeholder="Ask anything...">
        <button>Send</button>
    </form>

    <div class="message">
        <p><b>🤖 Edora:</b> {{ reply }}</p>
        <p>Detected: {{ emotion }}</p>
        <p>— Style: {{ style }}</p>
    </div>

    <br>

    <a href="/dashboard"><button>⬅ Back</button></a>

</div>

</body>
</html>
