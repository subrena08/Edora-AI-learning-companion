<!DOCTYPE html>
<html>
<head>
    <title>EDORA - AI Learning</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            height: 100vh;

            /* 🌈 Gradient Background */
            background: linear-gradient(135deg, #1e3a8a, #9333ea, #ec4899);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 15px;
            text-align: center;
            color: white;
            width: 300px;
            box-shadow: 0px 0px 20px rgba(0,0,0,0.3);
        }

        h1 {
            margin-bottom: 10px;
        }

        p {
            font-size: 14px;
            margin-bottom: 20px;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
            border: none;
            border-radius: 5px;
        }

        button {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 5px;
            background-color: #38bdf8;
            color: black;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background-color: #0ea5e9;
        }

        .title {
            font-size: 28px;
            font-weight: bold;
        }

        .subtitle {
            font-size: 14px;
            opacity: 0.8;
        }
    </style>
</head>

<body>

<div class="container">

    <div class="title">🌟 EDORA</div>
    <p class="subtitle">Your AI Learning Companion</p>

    <form method="POST">
        <input type="text" name="username" placeholder="Enter Username" required>
        <input type="password" placeholder="Enter Password" required>
        <button type="submit">Login</button>
    </form>

</div>

</body>
</html>
